<div class="casino-container">
  
  <!-- Top Promotion Banners Carousel/Grid -->
  <div class="promo-grid">
    <!-- Banner 1: Guardian Riches -->
    <div class="promo-card card-guardian">
      <div class="promo-content">
        <span class="promo-badge badge-only">Only on Stake</span>
        <h3 class="promo-title">Guardian Riches</h3>
        <p class="promo-subtitle">Treasure Worth Seeking</p>
        <button class="btn-play">Play Now!</button>
      </div>
      <div class="promo-graphic graphic-golem">
        <!-- Green stone golem representation -->
        <i class="fas fa-robot golem-icon text-success"></i>
      </div>
    </div>

    <!-- Banner 2: 2x VIP Progress -->
    <div class="promo-card card-vip">
      <div class="promo-content">
        <span class="promo-badge badge-promo">Promotion</span>
        <h3 class="promo-title">2x VIP Progress</h3>
        <p class="promo-subtitle">Boosted VIP on Only on Stake Games</p>
        <button class="btn-play">Play Now!</button>
      </div>
      <div class="promo-graphic graphic-headphones">
        <!-- Blue headphones representation -->
        <i class="fas fa-headphones headphones-icon text-info"></i>
      </div>
    </div>

    <!-- Banner 3: Poker Series -->
    <div class="promo-card card-poker">
      <div class="promo-content">
        <span class="promo-badge badge-promo">Promotion</span>
        <h3 class="promo-title">World KO Poker Series</h3>
        <p class="promo-subtitle">Over $1,000,000 in guarantees!</p>
        <button class="btn-play">Play Now</button>
      </div>
      <div class="promo-graphic graphic-poker">
        <!-- Gold soccer ball & chips representation -->
        <i class="fas fa-coins poker-icon text-warning"></i>
      </div>
    </div>
  </div>

  <!-- Search Bar -->
  <div class="search-section">
    <div class="search-input-wrapper">
      <i class="fas fa-search search-icon"></i>
      <input type="text" placeholder="Search Stake.com" class="search-input" />
    </div>
  </div>

  <!-- Casino Sub-navigation -->
  <div class="casino-subnav">
    <button class="subnav-btn active">
      <i class="fas fa-house-chimney"></i> Casino Home
    </button>
    <button class="subnav-btn">
      <i class="fas fa-dollar-sign"></i> Only on Stake
    </button>
    <button class="subnav-btn">
      <i class="fas fa-sparkles"></i> New Releases
    </button>
    <button class="subnav-btn">
      <i class="fas fa-fire"></i> Stake Originals
    </button>
    <button class="subnav-btn">
      <i class="fas fa-gamepad"></i> Slots
    </button>
    <button class="subnav-btn">
      <i class="fas fa-vr-cardboard"></i> Live Casino
    </button>
    <button class="subnav-btn">
      <i class="fas fa-clock-rotate-left"></i> Continue Playing
    </button>
  </div>

  <!-- Stake Originals Section -->
  <div class="games-section">
    <div class="section-header">
      <h2><i class="fas fa-fire text-danger"></i> Stake Originals</h2>
      <a href="#" class="view-all">View All</a>
    </div>

    <div class="originals-grid">
      <!-- 1. DICE -->
      <div class="original-card bg-dice">
        <div class="original-card-body">
          <div class="die-face face-1">
            <span class="dot"></span>
          </div>
          <div class="die-face face-2">
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
        <div class="original-card-footer">
          <span class="game-name">DICE</span>
        </div>
      </div>

      <!-- 2. MINES -->
      <div class="original-card bg-mines">
        <div class="original-card-body">
          <i class="fas fa-gem gem-icon text-success animate-bounce"></i>
        </div>
        <div class="original-card-footer">
          <span class="game-name">MINES</span>
        </div>
      </div>

      <!-- 3. PLINKO -->
      <div class="original-card bg-plinko">
        <div class="original-card-body">
          <div class="plinko-pins">
            <span class="pin"></span>
            <span class="pin"></span>
            <span class="pin"></span>
            <span class="ball animate-drop"></span>
          </div>
        </div>
        <div class="original-card-footer">
          <span class="game-name">PLINKO</span>
        </div>
      </div>

      <!-- 4. CHICKEN -->
      <div class="original-card bg-chicken">
        <div class="original-card-body">
          <i class="fas fa-egg egg-icon text-warning"></i>
        </div>
        <div class="original-card-footer">
          <span class="game-name">CHICKEN</span>
        </div>
      </div>

      <!-- 5. CRASH -->
      <div class="original-card bg-crash">
        <div class="original-card-body">
          <i class="fas fa-chart-line crash-chart text-success"></i>
        </div>
        <div class="original-card-footer">
          <span class="game-name">CRASH</span>
        </div>
      </div>

      <!-- 6. KENO -->
      <div class="original-card bg-keno">
        <div class="original-card-body">
          <div class="keno-grid">
            <span class="tile selected">2</span>
            <span class="tile selected">3</span>
            <span class="tile">10</span>
            <span class="tile">11</span>
          </div>
        </div>
        <div class="original-card-footer">
          <span class="game-name">KENO</span>
        </div>
      </div>

      <!-- 7. LIMBO -->
      <div class="original-card bg-limbo">
        <div class="original-card-body">
          <span class="limbo-multiplier">900.00x</span>
        </div>
        <div class="original-card-footer">
          <span class="game-name">LIMBO</span>
        </div>
      </div>

      <!-- 8. HILO -->
      <div class="original-card bg-hilo">
        <div class="original-card-body">
          <div class="card-display">
            <i class="fas fa-heart text-danger"></i>
            <span class="card-val">A</span>
          </div>
        </div>
        <div class="original-card-footer">
          <span class="game-name">HILO</span>
        </div>
      </div>
    </div>
  </div>
</div>
