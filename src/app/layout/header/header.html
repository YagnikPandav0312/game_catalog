<header class="header-container">
  <div class="header-left">
    <button class="hamburger-btn" (click)="onToggleSidebar()" aria-label="Toggle Sidebar">
      <i class="fas fa-bars"></i>
    </button>
    
    <a routerLink="/" class="logo-link">
      <span class="logo-text">Fun88</span>
    </a>
  </div>

  <div class="header-right">
    @if (authService.isLoggedIn()) {
      <div class="user-profile-bar">
        <div class="user-info">
          <i class="fas fa-user-circle user-avatar"></i>
          <span class="username">{{ authService.currentUser()?.username }}</span>
        </div>
        <button class="btn-logout" (click)="Logout()" title="Logout">
          <i class="fas fa-right-from-bracket"></i>
          <span>Logout</span>
        </button>
      </div>
    } @else {
      <button class="btn-login" (click)="onLogin()">Login</button>
      <button class="btn-register" (click)="onRegister()">Register</button>
    }
  </div>
</header>
